<!DOCTYPE html>
<style> 
  header { display: flex;justify-content: flex-start; align-items: center; padding: 10px;height: 80px; background-color: #F5F0E8;border-bottom: 1px solid #000000;position: fixed;top: 0;left: 0;width: 100%;z-index: 1000;box-shadow: 0 2px 6px rgba(0,0,0,0.15) }
header img {   height: 100%; width: auto;margin-right: 20px}
  h1 {font-family: "Brush Script MT", cursive;text-align: center; position: absolute;left: 50%; transform: translateX(-50%);margin: 0}
body {padding-top: 100px; }
.sidebar {position:fixed;top:80px;width:150px;bottom:0; ; border-right: 1px solid #000000; padding-top:20px ;box-shadow: 2px 0 6px rgba(0,0,0,0.15)}
.sidebar a {display:block;padding: 10px 20px;text-decoration:none;color:#000000}
.sidebar a:hover {background-color:#DCCFB5}
.content {margin-left:160px;padding:20px} 
.sidebar-hidden{display:none;} .content-full{margin-left:0;}
</style>
<body style="background-color: #F5F0E8;"> 
  
  <header>   <img src="Images/LOGO.png" alt="Mon logo" onclick="toggleSidebar()" style="cursor:pointer;"> <h1>Nos Recettes </h1> </header>
  <script> function toggleSidebar() {document.querySelector('.sidebar').classList.toggle('sidebar-hidden');document.querySelector('.content').classList.toggle('content-full');} </script>
  <div class="sidebar sidebar-hidden">
    <a href="#">Recettes salées</a>
    <a href="#">Recettes sucrées</a>
    <a href="#">Pates</a>
  </div>

   <div class="content content-full">
    <h2>Bienvenue sur notre livre de recettes en ligne !</h2>
     <p>Découvrez nos meilleures recettes faites maison.</p>
   </div>
  
<div class="search-bar"><input type="text" id="RechercheInput" placeholder="Rechercher une recette..."> <button onclick="rechercherRecette()">Rechercher</button>  </div> <div id="resultats"></div>
